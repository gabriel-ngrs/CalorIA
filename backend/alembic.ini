# =============================================================================
# Alembic — configuração de migrações
# =============================================================================

[alembic]
# Localização dos scripts de migração
script_location = alembic

# Adiciona o diretório raiz ao sys.path para importar app.*
prepend_sys_path = .

# Template para nomes dos arquivos de migração
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Timezone para --rev-id
timezone = UTC

# =============================================================================
# Logging
# =============================================================================
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
