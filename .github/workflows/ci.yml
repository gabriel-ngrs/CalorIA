name: CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — lint e testes
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: caloria
          POSTGRES_PASSWORD: caloria
          POSTGRES_DB: caloria_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Instalar dependências
        run: pip install -e ".[dev]"

      - name: Lint — ruff
        run: ruff check .

      - name: Type check — mypy
        run: mypy app/

      - name: Testes
        env:
          DATABASE_URL: postgresql+asyncpg://caloria:caloria@localhost:5432/caloria_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ci-test-secret-key-com-minimo-32-caracteres
          GEMINI_API_KEY: fake-key-for-tests
          TELEGRAM_BOT_TOKEN: 0000000000:fake-token-for-ci
          EVOLUTION_API_URL: http://localhost:8080
          EVOLUTION_API_KEY: fake-key
          EVOLUTION_INSTANCE_NAME: caloria-test
        run: pytest --cov=app --cov-report=xml -q

      - name: Upload cobertura
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.xml
          flags: backend
        continue-on-error: true

  frontend:
    name: Frontend — lint e build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Lint — ESLint
        run: npm run lint

      - name: Testes
        run: npm test -- --passWithNoTests

      - name: Build de produção
        env:
          NEXTAUTH_SECRET: ci-test-secret-key-qualquer
          NEXTAUTH_URL: http://localhost:3000
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: npm run build
