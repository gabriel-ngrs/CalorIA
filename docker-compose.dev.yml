# =============================================================================
# CalorIA — Docker Compose (Desenvolvimento)
# Hot reload ativado para backend e frontend.
# Portas expostas para acesso direto ao banco e redis.
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL 16
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: caloria_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-caloria}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-caloria}
      POSTGRES_DB: ${POSTGRES_DB:-caloria_db}
      TZ: America/Sao_Paulo
      PGTZ: America/Sao_Paulo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-caloria} -d ${POSTGRES_DB:-caloria_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - caloria_net

  # ---------------------------------------------------------------------------
  # Redis 7
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: caloria_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - caloria_net

  # ---------------------------------------------------------------------------
  # Backend — FastAPI com hot reload
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: caloria_backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/app
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      TZ: America/Sao_Paulo
      # VAPID keys para Web Push
      VAPID_PRIVATE_KEY: /app/vapid_private.pem
      VAPID_PUBLIC_KEY: BDChT45huqGa7bWKaKKszdz2bhahZeXGDTFW6eGmOEMTDVipub7hR4oVCZWdW7Q5uSIK5NaM6E4I7IL0eAQLWKY
      VAPID_CLAIMS_EMAIL: admin@caloria.app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - caloria_net

  # ---------------------------------------------------------------------------
  # Frontend — Next.js com hot reload
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: caloria_frontend
    # Inicia Next.js + roda script de warmup em background.
    # O warmup pré-compila /login e /dashboard durante o startup,
    # eliminando o atraso de compilação na primeira visita do usuário.
    command: sh -c "npm run dev -- --turbo & sh /app/scripts/warmup.sh; wait"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    env_file:
      - .env
    environment:
      # Habilita polling de arquivos no WSL2 + Docker bind mount.
      # inotify não propaga eventos entre host WSL2 e container — polling garante HMR.
      WATCHPACK_POLLING: "true"
    depends_on:
      - backend
    networks:
      - caloria_net

  # ---------------------------------------------------------------------------
  # Celery Worker (modo debug)
  # ---------------------------------------------------------------------------
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: caloria_celery_worker
    command: celery -A app.workers.celery_app worker --loglevel=debug --concurrency=1
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      TZ: America/Sao_Paulo
      VAPID_PRIVATE_KEY: /app/vapid_private.pem
      VAPID_PUBLIC_KEY: BDChT45huqGa7bWKaKKszdz2bhahZeXGDTFW6eGmOEMTDVipub7hR4oVCZWdW7Q5uSIK5NaM6E4I7IL0eAQLWKY
      VAPID_CLAIMS_EMAIL: admin@caloria.app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - caloria_net

  # ---------------------------------------------------------------------------
  # Celery Beat (modo debug)
  # ---------------------------------------------------------------------------
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: caloria_celery_beat
    command: celery -A app.workers.celery_app beat --loglevel=debug
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      TZ: America/Sao_Paulo
      VAPID_PRIVATE_KEY: /app/vapid_private.pem
      VAPID_PUBLIC_KEY: BDChT45huqGa7bWKaKKszdz2bhahZeXGDTFW6eGmOEMTDVipub7hR4oVCZWdW7Q5uSIK5NaM6E4I7IL0eAQLWKY
      VAPID_CLAIMS_EMAIL: admin@caloria.app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - caloria_net

# =============================================================================
# Volumes persistentes
# =============================================================================
volumes:
  postgres_data:
  redis_data:

# =============================================================================
# Rede compartilhada
# =============================================================================
networks:
  caloria_net:
    driver: bridge
