# =============================================================================
# CalorIA — Docker Compose (Desenvolvimento)
# Hot reload ativado para backend e frontend.
# Portas expostas para acesso direto ao banco e redis.
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL 16
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: caloria_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-caloria}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-caloria}
      POSTGRES_DB: ${POSTGRES_DB:-caloria_db}
      TZ: America/Sao_Paulo
      PGTZ: America/Sao_Paulo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-caloria} -d ${POSTGRES_DB:-caloria_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - caloria_net

  # ---------------------------------------------------------------------------
  # Redis 7
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: caloria_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - caloria_net

  # ---------------------------------------------------------------------------
  # Evolution API (WhatsApp)
  # ---------------------------------------------------------------------------
  evolution_api:
    image: atendai/evolution-api:latest
    container_name: caloria_evolution
    ports:
      - "8080:8080"
    environment:
      SERVER_URL: ${EVOLUTION_API_URL:-http://localhost:8080}
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:-changeme}
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "true"
      DEL_INSTANCE: "false"
      LANGUAGE: pt-BR
    volumes:
      - evolution_data:/evolution/instances
    networks:
      - caloria_net

  # ---------------------------------------------------------------------------
  # Backend — FastAPI com hot reload
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: caloria_backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/app
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      TZ: America/Sao_Paulo
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - caloria_net

  # ---------------------------------------------------------------------------
  # Frontend — Next.js com hot reload
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: caloria_frontend
    command: npm run dev -- --turbo
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    env_file:
      - .env
    depends_on:
      - backend
    networks:
      - caloria_net

  # ---------------------------------------------------------------------------
  # Celery Worker (modo debug)
  # ---------------------------------------------------------------------------
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: caloria_celery_worker
    command: celery -A app.workers.celery_app worker --loglevel=debug --concurrency=1
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      TZ: America/Sao_Paulo
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - caloria_net

  # ---------------------------------------------------------------------------
  # Bot Telegram — polling isolado do backend para evitar conflito com --reload
  # ---------------------------------------------------------------------------
  telegram_bot:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: caloria_telegram_bot
    command: python -m app.bots.telegram.run_polling
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      TZ: America/Sao_Paulo
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - caloria_net

  # ---------------------------------------------------------------------------
  # Celery Beat (modo debug)
  # ---------------------------------------------------------------------------
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: caloria_celery_beat
    command: celery -A app.workers.celery_app beat --loglevel=debug
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      TZ: America/Sao_Paulo
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - caloria_net

# =============================================================================
# Volumes persistentes
# =============================================================================
volumes:
  postgres_data:
  redis_data:
  evolution_data:

# =============================================================================
# Rede compartilhada
# =============================================================================
networks:
  caloria_net:
    driver: bridge
