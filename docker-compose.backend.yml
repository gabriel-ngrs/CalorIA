services:
  postgres:
    image: postgres:16-alpine
    container_name: caloria_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-caloria}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-caloria}
      POSTGRES_DB: ${POSTGRES_DB:-caloria_db}
    command: >
      postgres
        -c shared_buffers=256MB
        -c work_mem=8MB
        -c effective_cache_size=512MB
        -c random_page_cost=1.1
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-caloria} -d ${POSTGRES_DB:-caloria_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - caloria_net

  redis:
    image: redis:7-alpine
    container_name: caloria_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - caloria_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: caloria_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      TZ: America/Sao_Paulo
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_CLAIMS_EMAIL: ${VAPID_CLAIMS_EMAIL}
    volumes:
      - ${VAPID_KEY_PATH:-./vapid_private.pem}:/run/secrets/vapid_private_key:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - caloria_net

  caddy:
    image: caddy:2-alpine
    container_name: caloria_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-localhost}
    volumes:
      - ./Caddyfile.backend:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
    networks:
      - caloria_net

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: caloria_celery_worker
    restart: unless-stopped
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
    env_file:
      - .env
    environment:
      TZ: America/Sao_Paulo
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_CLAIMS_EMAIL: ${VAPID_CLAIMS_EMAIL}
    volumes:
      - ${VAPID_KEY_PATH:-./vapid_private.pem}:/run/secrets/vapid_private_key:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - caloria_net

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: caloria_celery_beat
    restart: unless-stopped
    command: celery -A app.workers.celery_app beat --loglevel=info
    env_file:
      - .env
    environment:
      TZ: America/Sao_Paulo
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - caloria_net

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:

networks:
  caloria_net:
    driver: bridge
