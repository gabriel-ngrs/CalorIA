# =============================================================================
# CalorIA — Docker Compose (Produção Local)
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL 16
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: caloria_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-caloria}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-caloria}
      POSTGRES_DB: ${POSTGRES_DB:-caloria_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-caloria} -d ${POSTGRES_DB:-caloria_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - caloria_net

  # ---------------------------------------------------------------------------
  # Redis 7
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: caloria_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - caloria_net

  # ---------------------------------------------------------------------------
  # Backend — FastAPI
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: caloria_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      TZ: America/Sao_Paulo
      VAPID_PRIVATE_KEY: /run/secrets/vapid_private_key
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_CLAIMS_EMAIL: ${VAPID_CLAIMS_EMAIL:-admin@caloria.app}
    volumes:
      - ${VAPID_KEY_PATH:-./backend/vapid_private.pem}:/run/secrets/vapid_private_key:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - caloria_net

  # ---------------------------------------------------------------------------
  # Frontend — Next.js
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
        NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-insecure-secret-change-in-production}
    container_name: caloria_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - backend
    networks:
      - caloria_net

  # ---------------------------------------------------------------------------
  # Caddy — Reverse proxy com HTTPS automático (Let's Encrypt)
  # ---------------------------------------------------------------------------
  caddy:
    image: caddy:2-alpine
    container_name: caloria_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - frontend
    networks:
      - caloria_net

  # ---------------------------------------------------------------------------
  # Celery Worker
  # ---------------------------------------------------------------------------
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: caloria_celery_worker
    restart: unless-stopped
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
    env_file:
      - .env
    environment:
      TZ: America/Sao_Paulo
      VAPID_PRIVATE_KEY: /run/secrets/vapid_private_key
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_CLAIMS_EMAIL: ${VAPID_CLAIMS_EMAIL:-admin@caloria.app}
    volumes:
      - ${VAPID_KEY_PATH:-./backend/vapid_private.pem}:/run/secrets/vapid_private_key:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - caloria_net

  # ---------------------------------------------------------------------------
  # Celery Beat (Agendador)
  # ---------------------------------------------------------------------------
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: caloria_celery_beat
    restart: unless-stopped
    command: celery -A app.workers.celery_app beat --loglevel=info
    env_file:
      - .env
    environment:
      TZ: America/Sao_Paulo
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - caloria_net

# =============================================================================
# Volumes persistentes
# =============================================================================
volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:

# =============================================================================
# Rede compartilhada
# =============================================================================
networks:
  caloria_net:
    driver: bridge
